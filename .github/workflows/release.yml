name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      # winit/glutin need the Wayland + X11 dev libraries at build time.
      - name: Install windowing dev libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libgl1-mesa-dev libegl1-mesa-dev

      - name: Build box3d (C library)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBOX3D_SAMPLES=OFF -DBOX3D_UNIT_TESTS=OFF -DBOX3D_BENCHMARKS=OFF
          cmake --build build --config Release --parallel

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 3dmodeler

      # bindgen needs libclang at build time.
      - name: Point bindgen at libclang (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Point bindgen at libclang (Windows)
        if: runner.os == 'Windows'
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Build modeler-app
        working-directory: 3dmodeler
        run: cargo build --release -p modeler-app

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czf "modeler-app-${{ github.ref_name }}-${{ matrix.name }}.tar.gz" \
            -C 3dmodeler/target/release modeler-app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path 3dmodeler\target\release\modeler-app.exe -DestinationPath "modeler-app-${{ github.ref_name }}-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: modeler-app-${{ github.ref_name }}-*

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and attach binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes || true
          gh release upload "${{ github.ref_name }}" dist/* --clobber
