<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>3D Modeler</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1f2126;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      outline: none;
    }
  </style>
</head>
<body>
  <!-- three-d attaches to the first canvas element in the DOM -->
  <canvas id="canvas"></canvas>
  <link data-trunk rel="rust" data-bin="modeler-app" />
  <script>
    // Keyboard shortcuts should work immediately, without a first click.
    const focusCanvas = () => {
      const canvas = document.querySelector('canvas');
      canvas.setAttribute('tabindex', '0');
      canvas.focus();
    };
    window.addEventListener('load', () => setTimeout(focusCanvas, 100));
  </script>
</body>
</html>
